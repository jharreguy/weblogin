<!-- src/app/features/auth/login/login.component.html -->
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">⬡</div>
      <h1>Bienvenido</h1>
      <p>Ingresá tus credenciales para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email"
               placeholder="nombre@ejemplo.com"
               [class.error]="isInvalid('email')" />
        <span class="err-msg" *ngIf="isInvalid('email')">Email inválido</span>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-icon">
          <input id="password" [type]="showPass ? 'text' : 'password'"
                 formControlName="password" placeholder="••••••••"
                 [class.error]="isInvalid('password')" />
          <button type="button" class="toggle-pass" (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="err-msg" *ngIf="isInvalid('password')">Mínimo 6 caracteres</span>

        <!-- ↓ Link olvidé contraseña -->
        <p style="text-align:right; margin-top:.4rem">
          <a routerLink="/forgot-password"
             style="font-size:.82rem; color:#818cf8; text-decoration:none">
            ¿Olvidaste tu contraseña?
          </a>
        </p>

      </div>

      <div class="alert alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer">
      ¿No tenés cuenta? <a routerLink="/register">Registrate</a>
    </p>
  </div>
</div>
